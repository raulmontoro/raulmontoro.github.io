        <script>
            // Get the elements with class="column"
            var elements = document.getElementsByClassName("column");
            
            // Declare a loop variable
            var i;
            
            // Full-width images
            function one() {
                for (i = 0; i < elements.length; i++) {
                elements[i].style.msFlex = "100%";  // IE10
                elements[i].style.flex = "100%";
              }
            }
            
            // Two images side by side
            function two() {
              for (i = 0; i < elements.length; i++) {
                elements[i].style.msFlex = "50%";  // IE10
                elements[i].style.flex = "50%";
              }
            }
            
            // Four images side by side
            function four() {
              for (i = 0; i < elements.length; i++) {
                elements[i].style.msFlex = "25%";  // IE10
                elements[i].style.flex = "25%";
              }
            }
            
            // Add active class to the current button (highlight it)
            var header = document.getElementById("myHeader");
            var btns = header.getElementsByClassName("btn");

            for (var i = 0; i < btns.length; i++) {
                btns[i].addEventListener("click", function() {
                    var current = document.getElementsByClassName("active");
                    current[0].className = current[0].className.replace(" active", "");
                    this.className += " active";
                });
            }
        </script>

        




        <!-- ARTICLE FORMS-->
        <script>

            /* form */
            const uploadInput = document.getElementById("uploadInput");

            uploadInput.addEventListener(
                  "change",
                  () => {
                    // Calculate total size
                    let numberOfBytes = 0;

                    for (const file of uploadInput.files) {
                        numberOfBytes += file.size;
                    }

                    // Approximate to the closest prefixed unit
                    const units = [
                      "B",
                      "KiB",
                      "MiB",
                      "GiB",
                      "TiB",
                      "PiB",
                      "EiB",
                      "ZiB",
                      "YiB",
                    ];

                    const exponent = Math.min(
                      Math.floor(Math.log(numberOfBytes) / Math.log(1024)),
                      units.length - 1
                    );

                    const approx = numberOfBytes / 1024 ** exponent;

                    const output =
                      exponent === 0
                        ? `${numberOfBytes} bytes`
                        : `${approx.toFixed(3)} ${
                            units[exponent]
                          } (${numberOfBytes} bytes)`;

                    document.getElementById("fileNum").textContent =
                      uploadInput.files.length;

                    document.getElementById("fileSize").textContent = output;
                  },
                  false
            );
        </script>

        




        <!-- ARTICLE FORMS-->
        <div class="content">
            <!-- READ FILES -->
            <input type='file' id='myfileinput' multiple>
            <button type="file" id="myfileinput" multiple>BROWSE...</button>            
            <button type="button" class="control-button" id="send-file-button">SUBMIT-FILE</button>
            
            <div id='output'>
        </div>
        <script>
            var button = document.getElementById("send-file-button");
            var fileInput = document.getElementById("myfileinput");
            var output = document.getElementById("output");
            
            button.onclick = function () {
              var files = fileInput.files;
              var reader = new FileReader();
              reader.onload = function () {
                output.innerText = reader.result;
              };
        
              if(files[0]) {
                // This does not return the text. It just starts reading.
                // The onload handler is triggered when it is done and the result is available.
                reader.readAsText(files[0]);
              }
            };
        </script>
