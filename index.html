<!DOCTYPE html>
<html>

    <style>
        table, th, td {

        }

</head>

    <th>Name:</th>

  </tr>
  <tr>
    <th rowspan="2">Telephone:</th>
    <td>55577854</td>
  </tr>
  <tr>
    <td>55577855</td>
  </tr>
</table>

</body>
</html>
